<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Refined Recording Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#F4A261",
                        "background": "#FFF8F3",
                        "accent": "#E9C46A",
                        "text-main": "#2A2A2A",
                        "soft-shadow": "rgba(42, 42, 42, 0.04)",
                    },
                    fontFamily: {
                        "sans": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "card": "16px",
                        "button": "24px",
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-[#F0EBE6] font-sans text-text-main antialiased;
            }
        }
        .soft-elevation {
            box-shadow: 0 4px 12px var(--soft-shadow);
        }
        .record-glow {
            box-shadow: 0 0 20px rgba(244, 162, 97, 0.3);
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex items-center justify-center min-h-screen">
<div class="relative flex h-[844px] w-[390px] flex-col overflow-hidden rounded-[48px] border-[8px] border-slate-900 bg-background shadow-2xl">
<div class="h-12 w-full"></div>
<header class="flex items-center px-6 py-4 justify-between">
<button class="text-text-main/60 flex h-11 w-11 items-center justify-center rounded-button bg-white soft-elevation transition-colors active:scale-95">
<span class="material-symbols-outlined text-2xl">chevron_left</span>
</button>
<h1 class="text-sm font-semibold tracking-tight text-text-main">Recording</h1>
<button class="text-text-main/60 flex h-11 w-11 items-center justify-center rounded-button bg-white soft-elevation transition-colors active:scale-95">
<span class="material-symbols-outlined text-2xl">more_horiz</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-between py-6">
<div class="flex flex-col items-center justify-center w-full px-6 mt-4">
<div class="relative w-64 h-64 flex items-center justify-center">
<div class="relative w-48 h-48 bg-[#FEF2E8] rounded-full flex items-center justify-center overflow-hidden border border-primary/10">
<div class="relative w-full h-full flex items-center justify-center">
<div class="absolute top-10 w-28 h-32 bg-accent/30 rounded-[60px]"></div>
<div class="absolute top-20 flex gap-8">
<div class="w-2.5 h-2.5 bg-text-main rounded-full"></div>
<div class="w-2.5 h-2.5 bg-text-main rounded-full"></div>
</div>
<div class="absolute top-26 w-6 h-3 border-b-2 border-text-main/40 rounded-full"></div>
<div class="absolute bottom-[-10px] w-36 h-24 bg-primary/20 rounded-t-[50px]"></div>
</div>
</div>
</div>
<div class="mt-8 text-center">
<span class="text-6xl font-light tracking-tight text-text-main">00:12:45</span>
<div class="mt-4 flex items-center justify-center gap-2">
<span class="flex h-2 w-2 rounded-full bg-primary"></span>
<p class="text-[11px] font-bold text-primary uppercase tracking-[0.15em]">Recording Live</p>
</div>
</div>
</div>
<div class="w-full px-12 flex flex-col items-center gap-6">
<div class="w-full h-12 flex items-center justify-center">
<svg class="w-full h-4" preserveAspectRatio="none" viewBox="0 0 300 20">
<line opacity="0.3" stroke="#F4A261" stroke-dasharray="1 4" stroke-width="1.5" x1="0" x2="300" y1="10" y2="10"></line>
<path d="M0,10 L30,10 L45,2 L60,18 L75,5 L90,15 L105,8 L120,12 L135,10 L300,10" fill="none" stroke="#F4A261" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<p class="text-[14px] text-text-main/40 font-medium italic">Your voice is being captured...</p>
</div>
<div class="w-full px-8 pb-4 flex items-center justify-between">
<button class="flex h-14 w-14 items-center justify-center rounded-button bg-white text-text-main/40 soft-elevation transition-transform active:scale-95">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<div class="relative">
<button class="record-glow relative z-10 flex h-20 w-20 items-center justify-center rounded-button bg-primary text-white transition-transform active:scale-90">
<span class="material-symbols-outlined text-4xl fill-1">pause</span>
</button>
</div>
<button class="flex h-14 w-14 items-center justify-center rounded-button bg-white text-primary soft-elevation transition-transform active:scale-95">
<span class="material-symbols-outlined text-2xl font-bold">check</span>
</button>
</div>
</main>
<nav class="ios-blur flex gap-2 border-t border-text-main/5 bg-white/60 px-6 pb-8 pt-4">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined text-[28px] fill-1">mic</span>
<p class="text-[10px] font-bold uppercase tracking-wider">Record</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-text-main/30" href="#">
<span class="material-symbols-outlined text-[28px]">inventory_2</span>
<p class="text-[10px] font-bold uppercase tracking-wider">Memories</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-text-main/30" href="#">
<span class="material-symbols-outlined text-[28px]">settings</span>
<p class="text-[10px] font-bold uppercase tracking-wider">Settings</p>
</a>
</nav>
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-text-main/10 rounded-full"></div>
</div>

</body></html>
