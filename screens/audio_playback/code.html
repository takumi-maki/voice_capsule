<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VoiceCapsule - Refined Playback</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#F4A261",
                        "background": "#FFF8F3",
                        "accent": "#E9C46A",
                        "text-main": "#2A2A2A",
                        "surface": "#FFFFFF",
                    },
                    fontFamily: {
                        "sans": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "button": "24px",
                        "card": "16px",
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body { 
                font-family: 'Plus Jakarta Sans', sans-serif;
                background-color: #F1F1F1;
            }
        }
        .ios-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex justify-center min-h-screen">
<div class="relative w-full max-w-[430px] h-[932px] bg-background text-text-main overflow-hidden flex flex-col shadow-2xl">
<div class="flex items-center px-6 pt-14 pb-4 justify-between shrink-0 z-20">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5 transition-colors">
<span class="material-symbols-outlined text-text-main">expand_more</span>
</button>
<div class="flex flex-col items-center">
<span class="text-[10px] uppercase tracking-[0.15em] font-bold text-text-main/50">Memories</span>
<h2 class="text-text-main text-sm font-semibold">Playback</h2>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5 transition-colors">
<span class="material-symbols-outlined text-text-main">more_horiz</span>
</button>
</div>
<div class="flex-1 flex flex-col items-center justify-center px-6 relative">
<div class="absolute inset-x-8 top-1/2 -translate-y-1/2 h-80 rounded-[40px] bg-[#FEF0E4] border border-[#F4A261]/10 pointer-events-none">
<img alt="Background scene" class="w-full h-full object-cover opacity-20 mix-blend-multiply" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwpBagx-c61qjoFL9z0fBF6kNuIoxJmdl3sPXUP2XiXJRwBj-EBV5yF0xqcou0thu28wSAinY_fiGQaNSLMW2aEiZWRF6_8UmaENh4cUqzZ_r_K7Ve92WkUjytYg_e8WIowRWMQoKguCJGgxw0qUKdjA0rD6EWtOQBr8Rt_ZW1nR-nhYPwi5gdBBDJZnHpH-m4Oc2kLBXLnWha1keOrMPjs-6j6t7r3CZehTY3wmQxzVJIQQGd5R660-cEB7AJFCpE0Twsx4J_Xvk"/>
</div>
<div class="relative z-10 w-64 h-64 flex items-center justify-center">
<div class="w-56 h-56 bg-accent/20 rounded-full flex items-center justify-center border-4 border-white ios-shadow">
<span class="material-symbols-outlined text-[160px] text-primary" style="font-variation-settings: 'FILL' 1">face_6</span>
</div>
</div>
<div class="mt-12 text-center z-10">
<h1 class="text-2xl font-bold text-text-main tracking-tight">Summer Picnic at Park</h1>
<p class="text-text-main/60 mt-1 font-medium text-sm">June 12, 2023 • 4:32</p>
</div>
</div>
<div class="px-6 pb-12 pt-4 z-20">
<div class="space-y-3 mb-8 px-2">
<div class="relative w-full h-1.5 bg-text-main/5 rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full w-1/3 bg-primary"></div>
</div>
<div class="flex justify-between text-[11px] font-semibold text-text-main/40 tabular-nums">
<span>01:24</span>
<span>04:32</span>
</div>
</div>
<div class="flex items-center justify-center gap-10 mb-10">
<button class="text-text-main/80 hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1">skip_previous</span>
</button>
<button class="text-text-main/80 hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1">skip_next</span>
</button>
</div>
<button class="w-full h-12 bg-primary text-white rounded-button font-bold flex items-center justify-center gap-2 active:scale-[0.98] transition-all ios-shadow">
<span class="material-symbols-outlined fill-1">pause</span>
<span>PAUSE RECORDING</span>
</button>
<div class="flex justify-between items-center mt-10 px-4">
<button class="flex flex-col items-center gap-1 text-text-main/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">share</span>
<span class="text-[10px] font-bold">SHARE</span>
</button>
<button class="flex flex-col items-center gap-1 text-text-main/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">favorite</span>
<span class="text-[10px] font-bold">SAVE</span>
</button>
<button class="flex flex-col items-center gap-1 text-text-main/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">speed</span>
<span class="text-[10px] font-bold">1.0X</span>
</button>
<button class="flex flex-col items-center gap-1 text-text-main/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">playlist_add</span>
<span class="text-[10px] font-bold">LIST</span>
</button>
</div>
</div>
<div class="flex justify-center pb-2 shrink-0">
<div class="w-32 h-1.5 bg-text-main/10 rounded-full"></div>
</div>
</div>

</body></html>
